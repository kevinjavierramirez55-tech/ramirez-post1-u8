<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Estudiantes</title></head>
<body>
  <h1>Lista de Estudiantes</h1>
  <a th:href="@{/estudiantes/nuevo}">Nuevo Estudiante</a>
  <table>
    <thead>

<tr><th>Nombre</th><th>Apellido</th><th>Correo</th><th>Carrera</th><th>Acciones</th></tr>
    </thead>
    <tbody>
      <tr th:each="e : ${estudiantes}">
        <td th:text="${e.nombre}"></td>
        <td th:text="${e.apellido}"></td>
        <td th:text="${e.correo}"></td>
        <td th:text="${e.carrera}"></td>
        <td>
          <a th:href="@{/estudiantes/editar/{id}(id=${e.id})}">Editar</a>
          <a th:href="@{/estudiantes/eliminar/{id}(id=${e.id})}">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>
</body>
</html>
