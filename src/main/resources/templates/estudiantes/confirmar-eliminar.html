<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Confirmar Eliminación</title></head>
<body>
  <h1>Confirmar Eliminación</h1>
  <p>¿Estás seguro de que deseas eliminar al estudiante <strong th:text="${estudiante.nombre + ' ' + estudiante.apellido}"></strong>?</p>
  <form th:action="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}" method="post">
    <button type="submit">Eliminar</button>
    <a th:href="@{/estudiantes}">Cancelar</a>
  </form>
</body>
</html>
